<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSION: JEE 99ile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;
  --card:rgba(18,14,8,0.92);
  --card2:rgba(12,10,5,0.95);
  --border:rgba(200,160,60,0.2);
  --blue:#7dd8ff;
  --orange:#fbbf24;
  --green:#86d9a0;
  --red:#f87171;
  --gold:#f5c842;
  --text:#f5ecd7;
  --muted:#a89070;
  --fh:'Orbitron',monospace;
  --fb:'Rajdhani',sans-serif;
  --fm:'Share Tech Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;font-size:16px;}

/* ── IIT BOMBAY BACKGROUND ── */
#iitbg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 100% 40% at 50% 0%, #1a1200 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 15% 80%, #0a0800 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 80%, #0a0800 0%, transparent 55%),
    linear-gradient(180deg, #060500 0%, #0c0900 35%, #06050a 70%, #060508 100%);
}

/* Stars */
.st{position:fixed;border-radius:50%;background:#fff8e7;pointer-events:none;z-index:0;}
@keyframes tw{0%{opacity:.15}50%{opacity:1}100%{opacity:.2}}

/* Lake */
#lake{
  position:fixed;bottom:0;left:0;right:0;height:18%;z-index:0;
  background:linear-gradient(180deg,rgba(6,20,50,0.6) 0%,rgba(3,10,28,0.95) 100%);
}
#lake::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 4px 60px at 25% 30%, rgba(245,200,60,0.35), transparent),
    radial-gradient(ellipse 4px 60px at 42% 20%, rgba(125,216,255,0.25), transparent),
    radial-gradient(ellipse 4px 60px at 58% 35%, rgba(245,180,40,0.3), transparent),
    radial-gradient(ellipse 4px 60px at 75% 25%, rgba(125,216,255,0.2), transparent),
    radial-gradient(ellipse 4px 40px at 60% 50%, rgba(245,200,60,0.2), transparent);
  animation:ref 5s ease-in-out infinite alternate;
}
@keyframes ref{0%{opacity:.5;transform:scaleX(1)}100%{opacity:1;transform:scaleX(1.01)}}

/* Moon */
#moon{
  position:fixed;top:5%;right:8%;width:60px;height:60px;border-radius:50%;z-index:2;
  background:radial-gradient(circle at 35% 35%,#fffde7,#f5c842);
  box-shadow:0 0 35px rgba(245,200,60,0.7),0 0 90px rgba(245,180,40,0.25);
}

.wrap{position:relative;z-index:2;max-width:860px;margin:0 auto;padding:14px 14px 60px;}

/* ── HEADER ── */
.hdr{text-align:center;padding:20px 0 14px;}
.hdr h1{font-family:var(--fh);font-size:clamp(26px,7vw,56px);font-weight:900;letter-spacing:3px;line-height:1.1;}
.hdr .m{color:var(--gold);}
.hdr .j{color:var(--blue);}
.hdr-sub{font-family:var(--fm);font-size:11px;letter-spacing:4px;color:var(--muted);margin-top:6px;}

/* ── QUOTE CARD ── */
.qcard{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px 20px;margin-bottom:14px;text-align:center;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
.qicon{font-size:22px;margin-bottom:7px;}
.qtext{font-size:15px;font-style:italic;color:var(--text);line-height:1.55;margin-bottom:6px;font-weight:500;}
.qauth{font-family:var(--fm);font-size:10px;letter-spacing:2px;color:var(--blue);}
.qdate{font-family:var(--fm);font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:1px;}

/* ── COUNTDOWN ── */
.cdcard{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  margin-bottom:14px;overflow:hidden;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
.cdhalves{display:grid;grid-template-columns:1fr 1fr;}
@media(max-width:460px){.cdhalves{grid-template-columns:1fr;}}
.cdhalf{padding:16px 12px;text-align:center;}
.cdhalf.mn{border-right:1px solid var(--border);}
@media(max-width:460px){.cdhalf.mn{border-right:none;border-bottom:1px solid var(--border);}}
.cdlbl{font-family:var(--fm);font-size:9px;letter-spacing:3px;margin-bottom:10px;}
.cdhalf.mn .cdlbl{color:var(--orange);}
.cdhalf.av .cdlbl{color:var(--blue);}
.cdboxes{display:flex;justify-content:center;gap:7px;}
.cdbox{background:var(--card2);border-radius:9px;padding:9px 11px;min-width:52px;text-align:center;}
.cdhalf.mn .cdbox{border:1px solid rgba(251,146,60,0.35);}
.cdhalf.av .cdbox{border:1px solid rgba(96,165,250,0.35);}
.cdn{font-family:var(--fh);font-size:22px;font-weight:700;color:#fff;line-height:1;}
.cdu{font-size:8px;letter-spacing:2px;color:var(--muted);margin-top:3px;}
.avdate{margin-top:9px;font-size:10px;color:var(--muted);font-family:var(--fm);}
.dpwrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.dplbl{font-size:9px;letter-spacing:2px;color:var(--muted);font-family:var(--fm);margin-bottom:6px;}
.dpslots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.dps{padding:5px 10px;border-radius:5px;border:1px solid var(--border);font-size:11px;font-family:var(--fm);cursor:pointer;transition:all .18s;color:var(--muted);background:var(--card2);user-select:none;}
.dps:hover{border-color:var(--orange);color:var(--orange);}
.dps.on{border-color:var(--orange);color:#000;background:var(--orange);font-weight:700;}
.dps.past{border-color:rgba(120,150,220,0.08);color:rgba(120,150,220,0.2);text-decoration:line-through;cursor:default;}

/* ── TABS ── */
.tabs{display:flex;margin-bottom:14px;border-radius:11px;overflow:hidden;border:1px solid var(--border);backdrop-filter:blur(16px);}
.tbtn{flex:1;padding:13px 8px;background:var(--card);border:none;color:var(--muted);font-family:var(--fh);font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.tbtn.on{background:rgba(245,200,60,0.08);color:var(--gold);border-bottom:2px solid var(--gold);}
.sec{display:none;}.sec.on{display:block;}

/* ── SYLLABUS ── */
.sylcard{background:var(--card);border:1px solid rgba(200,160,50,0.25);border-radius:13px;padding:16px;margin-bottom:14px;backdrop-filter:blur(16px);box-shadow:0 4px 30px rgba(0,0,0,0.5);}
.syltop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sylttl{color:var(--orange);font-family:var(--fh);font-size:13px;}
.sylpct{color:var(--green);font-family:var(--fh);font-size:22px;font-weight:700;}
.pgout{background:var(--card2);border-radius:4px;height:7px;margin-bottom:5px;overflow:hidden;border:1px solid var(--border);}
.pgin{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:4px;transition:width .5s ease;}
.pgcnt{color:var(--muted);font-size:13px;font-family:var(--fm);text-align:center;margin-bottom:12px;}
.subsec{margin-bottom:8px;}
.subhd{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .18s;}
.subhd:hover{background:rgba(255,255,255,0.05);}
.subdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.subnm{font-family:var(--fh);font-size:12px;flex:1;}
.subpg{font-size:12px;color:var(--muted);font-family:var(--fm);}
.subarr{color:var(--muted);font-size:10px;transition:transform .2s;}
.subhd.open .subarr{transform:rotate(90deg);}
.chlist{display:none;padding-left:22px;}
.chlist.open{display:block;}
.chitem{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;cursor:pointer;border-left:2px solid var(--border);margin-bottom:2px;transition:background .12s;}
.chitem:hover{background:rgba(255,255,255,0.04);}
.chk{width:18px;height:18px;border:2px solid var(--muted);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;}
.chk.on{background:var(--green);border-color:var(--green);}
.chk.on::after{content:'✓';color:#000;font-size:10px;font-weight:700;}
.chnm{font-size:15px;}.chnm.done{color:var(--muted);text-decoration:line-through;}

/* ── ARENA ── */
.acard{background:var(--card);border-radius:13px;padding:16px;margin-bottom:14px;backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(0,0,0,0.25);}
.acard.gb{border:1.5px solid rgba(74,222,128,0.4);}
.acard.ob{border:1.5px solid rgba(251,146,60,0.4);}
.attl{text-align:center;font-family:var(--fh);font-size:16px;letter-spacing:2px;margin-bottom:13px;}
.attl.g{color:var(--green);}.attl.o{color:var(--orange);}
.tmrwrap{text-align:center;margin-bottom:14px;}
.tmrdisp{font-family:var(--fh);font-size:36px;color:var(--orange);letter-spacing:5px;}
.tmrbtns{display:flex;gap:9px;justify-content:center;margin-top:8px;}
.tb2{padding:7px 18px;border-radius:7px;border:1px solid;font-family:var(--fh);font-size:9px;cursor:pointer;background:transparent;transition:all .18s;}
.tb2.go{border-color:var(--green);color:var(--green);}
.tb2.rs{border-color:var(--muted);color:var(--muted);}
.cfg{display:flex;gap:8px;flex-wrap:wrap;padding:13px;background:var(--card2);border-radius:9px;border:1px solid var(--border);margin-bottom:13px;align-items:flex-end;}
.cfgg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:80px;}
.cfgg.w{flex:2;min-width:130px;}
.cfgg.ww{flex:3;min-width:150px;}
.cfglbl{font-size:11px;color:var(--muted);letter-spacing:1px;font-family:var(--fm);}
.cfgsel,.cfgin{background:rgba(10,16,36,0.8);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:7px;font-family:var(--fb);font-size:15px;font-weight:600;width:100%;}
.cfgsel:focus,.cfgin:focus{outline:none;border-color:var(--blue);}
.genbtn{padding:11px 18px;background:linear-gradient(135deg,var(--gold),#d97706);border:none;border-radius:8px;color:#000;font-family:var(--fh);font-size:9px;font-weight:700;cursor:pointer;letter-spacing:1px;white-space:nowrap;transition:all .2s;}
.genbtn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,200,60,0.4);}

.stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px;}
.stc{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:13px;font-family:var(--fm);}
.stc b{color:var(--blue);}
.qtbl{width:100%;border-collapse:collapse;}
.qtbl th{padding:9px 7px;text-align:left;font-family:var(--fm);font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);letter-spacing:1px;}
.qtbl td{padding:11px 7px;border-bottom:1px solid rgba(120,150,220,0.1);vertical-align:top;}
.qninp{width:46px;background:var(--card2);border:1px solid var(--border);color:var(--blue);font-family:var(--fh);font-size:15px;font-weight:700;text-align:center;border-radius:7px;padding:5px 3px;outline:none;}
.chlbl{font-size:14px;font-weight:700;}
.sublbl{font-size:11px;color:var(--muted);font-family:var(--fm);margin-top:1px;}
.tbadge{display:inline-block;margin-top:4px;padding:3px 9px;border-radius:4px;font-size:10px;font-family:var(--fm);letter-spacing:1px;}
.tbm{background:rgba(96,165,250,0.1);color:var(--blue);border:1px solid rgba(96,165,250,0.3);}
.tbn{background:rgba(251,146,60,0.1);color:var(--orange);border:1px solid rgba(251,146,60,0.3);}
.opts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
.opt{width:50px;height:46px;border-radius:9px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:17px;font-weight:700;color:var(--muted);cursor:pointer;background:var(--card2);transition:all .15s;user-select:none;}
.opt:hover{border-color:var(--blue);color:var(--blue);}
.opt.sel{border-color:var(--blue);color:#fff;background:var(--blue);}
.opt.csel{border-color:var(--green);color:#000;background:var(--green);}
.numin{background:var(--card2);border:2px solid var(--border);color:var(--orange);padding:9px 12px;border-radius:9px;font-family:var(--fm);font-size:16px;width:140px;text-align:center;transition:all .18s;}
.numin:focus{outline:none;border-color:var(--orange);}
.ordiv{display:flex;align-items:center;gap:7px;margin:8px 0;}
.ordiv .ln{flex:1;height:1px;background:var(--border);}
.ordiv span{font-size:10px;color:var(--muted);font-family:var(--fm);}
.uadisp{font-family:var(--fm);font-size:13px;font-weight:700;}
.uam{color:var(--blue);}.uan{color:var(--orange);}.uas{color:var(--muted);font-style:italic;}
.btnsub{display:block;width:100%;max-width:340px;margin:16px auto 0;padding:15px 0;background:linear-gradient(135deg,var(--blue),#2563eb);border:none;border-radius:10px;color:#fff;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(96,165,250,0.2);}
.btnsub:hover{transform:translateY(-2px);}
.btnres{display:block;width:100%;max-width:340px;margin:16px auto 0;padding:15px 0;background:linear-gradient(135deg,var(--green),#16a34a);border:none;border-radius:10px;color:#000;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.btnres:hover{transform:translateY(-2px);}
.rescard{display:none;background:var(--card);border:1.5px solid rgba(74,222,128,0.4);border-radius:13px;padding:20px;margin-top:14px;text-align:center;backdrop-filter:blur(16px);}
.rescard.on{display:block;}
.resttl{font-family:var(--fh);font-size:16px;color:var(--green);letter-spacing:2px;margin-bottom:14px;}
.resgrid{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.resbox{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:11px 15px;min-width:82px;}
.resval{font-family:var(--fh);font-size:28px;font-weight:700;}
.reslbl{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.vg{color:var(--green);}.vr{color:var(--red);}.vc{color:var(--blue);}
.anslist{margin-top:12px;text-align:left;}
.ansrow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:3px;}
.ansrow.ok{background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.2);}
.ansrow.no{background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);}
.ansrow.sk{background:rgba(136,153,187,0.07);border:1px solid rgba(136,153,187,0.2);}
.aqn{font-family:var(--fh);font-size:11px;color:var(--blue);min-width:28px;}

/* ── AI CHAT ── */
.aibar{display:flex;border-bottom:1px solid var(--border);}
.aistab{flex:1;padding:13px 6px;background:var(--card);border:none;color:var(--muted);font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border-right:1px solid var(--border);}
.aistab:last-child{border-right:none;}
.aistab.on{background:rgba(245,200,60,0.1);color:var(--gold);}
.chatwin{height:400px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;background:rgba(5,10,22,0.7);}
.cmsg{display:flex;}
.cmsg.u{justify-content:flex-end;}
.cmsg.b{justify-content:flex-start;}
.cbub{max-width:82%;padding:11px 15px;border-radius:13px;font-size:15px;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.cbub.u{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;font-weight:600;border-radius:13px 13px 3px 13px;}
.cbub.b{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:13px 13px 13px 3px;}
.cbub.ty{color:var(--muted);font-family:var(--fm);font-size:12px;letter-spacing:3px;}
.chatinp{display:flex;gap:9px;padding:13px;background:var(--card2);border-top:1px solid var(--border);align-items:flex-end;}
#chatTxt{flex:1;background:rgba(10,16,36,0.9);border:1.5px solid var(--border);color:var(--text);padding:11px 13px;border-radius:9px;font-family:var(--fb);font-size:16px;resize:none;min-height:46px;max-height:120px;line-height:1.4;outline:none;transition:border-color .2s;}
#chatTxt:focus{border-color:var(--blue);}
#chatSendBtn{padding:11px 17px;background:linear-gradient(135deg,var(--blue),#2563eb);border:none;border-radius:9px;color:#fff;font-family:var(--fh);font-size:10px;font-weight:700;cursor:pointer;min-height:46px;white-space:nowrap;transition:all .2s;}
#chatSendBtn:disabled{opacity:0.5;cursor:not-allowed;}

::-webkit-scrollbar{width:3px;}

/* ── MOCK TRACKER ── */
.mocklog-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.mocklog-title{font-family:var(--fh);font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;}
.mocklog-row{display:flex;gap:8px;flex-wrap:wrap;}
.mocklog-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px;}
.period-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.ptab{flex:1;padding:9px 6px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-family:var(--fh);font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .2s;min-width:60px;}
.ptab.on{background:rgba(245,200,60,0.12);border-color:var(--gold);color:var(--gold);}
.sumgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
@media(min-width:500px){.sumgrid{grid-template-columns:repeat(4,1fr);}}
.sumbox{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.sumval{font-family:var(--fh);font-size:24px;font-weight:700;}
.sumlbl{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:3px;font-family:var(--fm);}
.mock-item{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.mock-date{font-family:var(--fm);font-size:11px;color:var(--muted);min-width:70px;}
.mock-score{font-family:var(--fh);font-size:20px;font-weight:700;color:var(--gold);min-width:60px;}
.mock-acc{font-size:13px;color:var(--blue);font-family:var(--fm);}
.mock-qs{font-size:12px;color:var(--muted);font-family:var(--fm);}
.mock-del{margin-left:auto;background:transparent;border:1px solid rgba(248,113,113,0.3);color:var(--red);border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;}
.motiv-bar{border-radius:10px;padding:14px 16px;text-align:center;margin-top:6px;font-size:15px;font-weight:600;line-height:1.5;display:none;}
.motiv-bar.on{display:block;}
.streak-fire{font-size:28px;margin-bottom:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(120,150,220,0.3);border-radius:2px;}
</style>
</head>
<body>

<!-- Background elements -->
<div id="iitbg"></div>
<!-- IIT BOMBAY BUILDING SVG - Fixed full width at bottom -->
<svg id="iitsvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400"
  style="position:fixed;bottom:0;left:0;width:100%;height:52%;z-index:1;pointer-events:none;"
  preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1206"/>
      <stop offset="100%" stop-color="#080600"/>
    </linearGradient>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120f04"/>
      <stop offset="100%" stop-color="#060400"/>
    </linearGradient>
    <!-- Golden glow for lights -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ LEFT SIDE BUILDINGS ══ -->
