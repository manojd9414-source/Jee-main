<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JEE Main 99ile Tracker & Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050810; --phy: #00d4ff; --chem: #00ff9d; --math: #ff6b35;
    --text: #c8d0e0; --muted: #4a5568; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace;
    min-height: 100vh; text-align: center;
    background-image: radial-gradient(ellipse at 15% 15%, #0a1628 0%, transparent 55%), radial-gradient(ellipse at 85% 85%, #0d0a1e 0%, transparent 55%);
  }
  .grid-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 28px 16px; }
  
  /* COMMON CARD STYLE */
  .card { border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; border: 1px solid var(--border); background: var(--card); backdrop-filter: blur(8px); }
  h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(26px, 7vw, 54px); background: linear-gradient(135deg, #00d4ff 0%, #fff 50%, #ff6b35 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  
  /* PRACTICE SPECIFIC */
  button { padding: 10px 20px; border: none; font-family: 'Orbitron'; background: var(--phy); color: black; cursor: pointer; border-radius: 8px; margin-top: 15px; font-weight: 900; }
  button:hover { box-shadow: 0 0 15px var(--phy); }
  input[type="number"], input[type="text"] { background: #000; color: #fff; padding: 6px; border: 1px solid var(--border); border-radius: 6px; text-align: center; }
  table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 14px; }
  td, th { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .timer { font-size: 24px; color: var(--math); font-family: 'Orbitron'; text-shadow: 0 0 10px var(--math); margin: 10px 0; }
  .hidden { display: none; }
  
  /* TRACKER STYLES (FROM ORIGINAL) */
  .cd-num { font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 900; color: #fff; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
  .prog-pct { font-family: 'Orbitron', sans-serif; font-size: 26px; color: #fff; }
  .bar-track { background: rgba(255,255,255,0.06); border-radius: 99px; height: 8px; overflow: hidden; margin: 10px 0; }
  .bar-fill { height: 100%; transition: width 0.6s ease; }
  .ch-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; text-align: left; }
  .ch-item:hover { background: rgba(255,255,255,0.03); }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap">
  <h1>MISSION: JEE 99ile</h1>

  <div class="card">
    <div style="color:var(--phy); font-size:10px; letter-spacing:4px;">COUNTDOWN TO 2026</div>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;" id="countdown">
      <div><div class="cd-num" id="cd-days">00</div><div style="font-size:10px;">DAYS</div></div>
      <div><div class="cd-num" id="cd-hrs">00</div><div style="font-size:10px;">HRS</div></div>
      <div><div class="cd-num" id="cd-min">00</div><div style="font-size:10px;">MIN</div></div>
      <div><div class="cd-num" id="cd-sec">00</div><div style="font-size:10px;">SEC</div></div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="color:var(--math)">Syllabus Progress</span>
      <span class="prog-pct" id="overall-pct">0%</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="overall-bar" style="width:0%; background:var(--chem);"></div></div>
    <div id="done-count" style="font-size:12px; color:var(--muted);">0/67 chapters</div>
  </div>

  <div class="card" style="border-color: var(--chem);">
    <h2 style="font-family:'Orbitron'; color:var(--chem);">PRACTICE ARENA</h2>
    <div id="setup-practice">
      <label>Questions:</label>
      <input type="number" id="qCount" value="10" min="1" max="100">
      <button onclick="startPractice()">LAUNCH SESSION</button>
    </div>
    <div class="timer hidden" id="timer">00:00</div>
    
    <div class="hidden" id="practiceArea">
      <table id="questionTable">
        <thead><tr><th>Q</th><th>Type</th><th>Your Ans</th><th class="hidden" id="keyHead">Correct Key</th></tr></thead>
        <tbody></tbody>
      </table>
      <button onclick="lockAnswers()" id="lockBtn">LOCK ANSWERS</button>
      <button onclick="calculateScore()" class="hidden" id="scoreBtn" style="background:var(--chem)">CALCULATE SCORE</button>
    </div>

    <div class="hidden" id="resultArea" style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
      <h2 id="scoreText" style="font-family:'Orbitron'; font-size:32px;"></h2>
      <div id="badge" style="font-size:20px; margin:10px 0; color:var(--phy);"></div>
      <div id="history" style="font-size:12px; color:var(--chem);"></div>
      <button onclick="location.reload()" style="background:transparent; color:var(--text); border:1px solid var(--muted);">RESET</button>
    </div>
  </div>
</div>

<script>
// --- TRACKER LOGIC ---
const JEE_DATE = new Date("2026-04-05T00:00:00");
function updateCountdown() {
  const diff = JEE_DATE - new Date();
  if (diff <= 0) return;
  const pad = n => String(n).padStart(2, "0");
  document.getElementById("cd-days").textContent = pad(Math.floor(diff / 86400000));
  document.getElementById("cd-hrs").textContent = pad(Math.floor((diff % 86400000) / 3600000));
  document.getElementById("cd-min").textContent = pad(Math.floor((diff % 3600000) / 60000));
  document.getElementById("cd-sec").textContent = pad(Math.floor((diff % 60000) / 1000));
}
setInterval(updateCountdown, 1000);
updateCountdown();

// --- PRACTICE LOGIC ---
let timerInterval, seconds=0, questions=[];
function startPractice() {
  let count = parseInt(document.getElementById("qCount").value);
  questions = [];
  let mcqCount = Math.floor(count * 0.7);
  for(let i=0; i<count; i++) questions.push({type: i < mcqCount ? "MCQ" : "NUM"});
  
  let tbody = document.querySelector("#questionTable tbody");
  tbody.innerHTML = "";
  questions.forEach((q, i) => {
    let row = `<tr><td>${i+1}</td><td>${q.type}</td>
      <td>${q.type=="MCQ" ? `<input type="radio" name="q${i}" value="A">A <input type="radio" name="q${i}" value="B">B <input type="radio" name="q${i}" value="C">C <input type="radio" name="q${i}" value="D">D` : `<input type="text" id="ans${i}" style="width:60px">`}</td>
      <td class="hidden"><input id="key${i}" style="width:50px; border:1px dashed #555"></td></tr>`;
    tbody.innerHTML += row;
  });

  document.getElementById("setup-practice").classList.add("hidden");
  document.getElementById("practiceArea").classList.remove("hidden");
  document.getElementById("timer").classList.remove("hidden");
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById("timer").innerText = String(Math.floor(seconds/60)).padStart(2,'0')+":"+String(seconds%60).padStart(2,'0');
  }, 1000);
}

function lockAnswers() {
  document.getElementById("keyHead").classList.remove("hidden");
  document.querySelectorAll("#questionTable tbody tr").forEach(r => r.children[3].classList.remove("hidden"));
  document.getElementById("scoreBtn").classList.remove("hidden");
  document.getElementById("lockBtn").classList.add("hidden");
  alert("Now enter Correct Answers from your Answer Key and click Calculate.");
}

function calculateScore() {
  clearInterval(timerInterval);
  let score = 0;
  questions.forEach((q, i) => {
    let correct = document.getElementById("key"+i).value.trim().toUpperCase();
    let user = q.type=="MCQ" ? (document.querySelector(`input[name=q${i}]:checked`)?.value || "") : document.getElementById("ans"+i).value.trim();
    if(user === "") return;
    if(user == correct) score += 4;
    else if(q.type == "MCQ") score -= 1;
  });
  
  document.getElementById("practiceArea").classList.add("hidden");
  document.getElementById("resultArea").classList.remove("hidden");
  document.getElementById("scoreText").innerText = "Score: " + score;
  let badge = score > 30 ? "🏆 AIR-1 MATERIAL" : score > 15 ? "🔥 STRONG" : "📚 KEEP WORKING";
  document.getElementById("badge").innerText = badge;
  
  let history = JSON.parse(localStorage.getItem("jeeScores")||"[]");
  history.unshift(score);
  localStorage.setItem("jeeScores", JSON.stringify(history.slice(0,5)));
  document.getElementById("history").innerText = "Recent: " + history.slice(0,5).join(", ");
}
</script>
</body>
</html>
row.innerHTML=`

<td>${i+1}</td>

<td>
<input placeholder="Chapter name">
</td>

<td>
<select id="type${i}">
<option value="MCQ">MCQ</option>
<option value="NUM">Numerical</option>
</select>
</td>

<td>

<div id="mcq${i}">
<label><input type="radio" name="q${i}" value="A">A</label>
<label><input type="radio" name="q${i}" value="B">B</label>
<label><input type="radio" name="q${i}" value="C">C</label>
<label><input type="radio" name="q${i}" value="D">D</label>
</div>

<input type="text" id="num${i}" style="display:none">

</td>

<td class="hidden">
<input id="key${i}">
</td>

`
